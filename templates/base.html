<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Dulce Hogar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu hoja de estilos -->
   <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header class="bg-warning text-dark text-center p-3">
        <h1>Panadería y Pastelería Dulce Hogar</h1>
        <nav class="nav justify-content-center">
            <a class="nav-link text-dark fw-bold" href="{{ url_for('index') }}">Inicio</a>
            <a class="nav-link text-dark fw-bold" href="{{ url_for('about') }}">Sobre Nosotros</a>
        </nav>
    </header>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-dark text-white text-center p-3 mt-4">
        <p>© 2025 Dulce Hogar - Todos los derechos reservados</p>
    </footer>

    <!-- Bootstrap JS (para que funcione el carrusel) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
